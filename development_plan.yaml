version: 1
status: active
last_updated_utc: "2026-04-11T00:00:00Z"
owner: "engineering"

objective: "Evaluate and migrate the bot to production-grade API-first deterministic execution."

phases:
  - id: P0
    name: baseline_and_inventory
    status: completed
    window_days: 1
    deliverables:
      - baseline_test_report
      - prioritized_blockers_top10
      - config_load_matrix
    exit_criteria:
      - "all smoke commands reproducible"
      - "top 10 blockers classified by severity"

  - id: P1
    name: config_and_contract_hardening
    status: completed
    window_days: 2
    deliverables:
      - typed_config_schema_complete
      - config_validation_tests
    exit_criteria:
      - "strategy_config profile load validated"
      - "invalid config rejected with clear errors"

  - id: P2
    name: strategy_core_consistency
    status: completed
    window_days: 2
    deliverables:
      - formula_parity_checklist
      - unit_tests_green_for_core_math
    exit_criteria:
      - "edge and sizing equations match strategy spec"
      - "filters and no-trade window centrally enforced"

  - id: P3
    name: execution_resilience
    status: in_progress
    window_days: 2
    deliverables:
      - idempotency_and_requote_validation
      - retry_and_killswitch_tests
    exit_criteria:
      - "no duplicate order under retry/timeouts"
      - "killswitch tested for api/order anomalies"

  - id: P4
    name: observability_and_replay
    status: pending
    window_days: 2
    deliverables:
      - decision_snapshot_schema
      - replay_script_or_module
      - daily_report_template
    exit_criteria:
      - "one full day replayed deterministically"
      - "daily report generated by asset/regime/hour/side"

  - id: P5
    name: paper_validation_gate
    status: pending
    window_days: 14
    deliverables:
      - promotion_report_demo_to_real
    exit_criteria:
      - ">=150 paper trades"
      - "positive EV per trade"
      - "profit factor > 1.15"
      - "max drawdown within configured limits"
      - "no severe operational incidents"

baseline:
  known_blockers:
    - id: B001
      severity: critical
      area: tests_and_imports
      description: "Legacy import src.core.database missing in runtime path"
      status: mitigated_with_compatibility_bridge

next_actions:
  - "Run wider suite and classify remaining failures by module"
  - "Wire kill-switch counters to runtime execution flow"
  - "Add integration tests for repeated API/order failure streaks"
  - "Add retry coverage for market data HTTP paths under 429/5xx"
  - "Prepare P3 completion report with incident scenarios"

acceptance_metrics:
  quality:
    unit_test_pass_rate_min: 0.95
    integration_test_pass_rate_min: 0.90
  strategy:
    min_paper_trades: 150
    min_profit_factor: 1.15
    min_ev_per_trade: 0.0
