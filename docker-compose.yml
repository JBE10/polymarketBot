version: '3.8'

services:
  bot:
    build: .
    container_name: polymarket_bot
    restart: unless-stopped
    command: ["python", "-m", "src.main"]
    env_file:
      - .env
    environment:
      # Sobrescribir URL para apuntar al contenedor local de la red de Docker
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8080:8080" # Bot healthcheck
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      ollama:
        condition: service_healthy

  dashboard:
    build: .
    container_name: polymarket_dashboard
    restart: unless-stopped
    command: ["streamlit", "run", "src/dashboard.py", "--server.port=8501", "--server.address=0.0.0.0"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    ports:
      - "8501:8501"

  # Ollama corriendo de forma local en la VPS para el LLM
  ollama:
    image: ollama/ollama:latest
    container_name: polymarket_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ollama_data:
